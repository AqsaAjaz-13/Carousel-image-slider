<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Carousel</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>




<div class="container">

    <h1>Image Carousel</h1>

    <div class="carousel">

        <button onclick="prevImage()">❮</button>

        <div class="image-box">

            <img class="slide" src="assests/img 1.jpg">
            <img class="slide" src="assests/img 2.jpg">
            <img class="slide" src="assests/img 3.jpg">
            <img class="slide" src="assests/tree.jpg">

        </div>

        <button onclick="nextImage()">❯</button>

    </div>

</div>




    <script src="Main.js"></script>
</body>
</html>
